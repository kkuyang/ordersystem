<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#191f28">
  <title>도미노피자 재고·발주 자동화</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <h1>도미노피자 재고·발주</h1>
    <p>재고 입력 → 분석 → 발주 이메일 발송</p>
  </header>

  <div class="container">
    <div class="card">
      <div class="card-title">재고 입력</div>
      <p class="help-text">엑셀 파일을 업로드하거나 아래 표에서 직접 수정 후 <strong>분석하기</strong>를 누르세요.</p>
      <div class="upload-row">
        <label class="upload-zone" for="excelInput">
          <input type="file" id="excelInput" accept=".xlsx,.xls" hidden>
          <span class="upload-icon">📊</span>
          <span class="upload-text">엑셀 파일 불러오기</span>
          <span class="upload-hint">.xlsx, .xls</span>
        </label>
      </div>
      <div class="table-wrap">
        <table class="inv-table" id="invTable">
          <thead>
            <tr>
              <th class="col-actions"></th>
              <th class="col-code">품목코드</th>
              <th class="col-name">재료명</th>
              <th class="col-spec">규격</th>
              <th class="col-unit">단위</th>
              <th class="col-num">현재재고</th>
              <th class="col-num">안전재고</th>
              <th class="col-num">MOQ</th>
              <th class="col-supplier">거래처</th>
              <th class="col-email">이메일</th>
            </tr>
          </thead>
          <tbody id="invBody"></tbody>
        </table>
      </div>
      <button class="btn btn-primary" id="btnAnalyze">분석하기</button>
    </div>

    <div id="mainGrid" style="display:none;">
      <div id="summarySection" class="card summary-card">
        <div class="card-title">오늘 재고 요약</div>
        <div class="summary-grid" id="summaryGrid"></div>
      </div>

      <div id="resultSection" class="card">
        <div class="card-title">재고 현황 결과</div>
        <div class="table-wrap">
          <table class="inv-table">
            <thead>
              <tr>
                <th class="col-code">품목코드</th>
                <th class="col-name">재료명</th>
                <th class="col-num">현재재고</th>
                <th class="col-num">안전재고</th>
                <th class="col-num">부족수량</th>
                <th class="col-num">발주권장</th>
                <th>상태</th>
                <th class="col-supplier">거래처</th>
              </tr>
            </thead>
            <tbody id="resultBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="ordersSection" class="card" style="display:none;">
      <div class="card-title">거래처별 발주 필요 현황</div>
      <div id="ordersList" class="orders-grid"></div>
    </div>
  </div>

  <div class="modal" id="emailModal">
    <div class="modal-content">
      <h3>발주 이메일</h3>
      <div class="form-group">
        <label>점포명</label>
        <input type="text" id="storeName" value="점포" placeholder="점포명">
      </div>
      <div class="form-group">
        <label>제목</label>
        <input type="text" id="emailSubject" readonly>
      </div>
      <div class="form-group">
        <label>본문</label>
        <div class="preview" id="emailBody"></div>
      </div>
      <div class="form-group">
        <label>수신 이메일</label>
        <input type="email" id="emailTo" placeholder="거래처 이메일">
      </div>
      <div class="modal-actions">
        <button class="btn btn-primary" id="btnSendEmail">이메일 보내기</button>
        <button class="btn btn-ghost" id="btnCloseModal">닫기</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
